<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
  body {
    max-width: 800px;
    margin: 2em auto;
    padding: 0 1em;
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 16px;
    line-height: 1.6;
    color: #222;
  }
  h1, h2, h3 { color: #111; margin-top: 1.5em; }
  h1 { font-size: 1.8em; border-bottom: 2px solid #333; padding-bottom: 0.3em; }
  h2 { font-size: 1.4em; }
  h3 { font-size: 1.2em; }
  pre, code {
    background: #f4f4f4;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 0.9em;
  }
  pre {
    padding: 1em;
    border: 1px solid #ddd;
    overflow-x: auto;
    line-height: 1.4;
  }
  code { padding: 0.1em 0.3em; }
  pre code { padding: 0; background: none; }
  .math { overflow-x: auto; }
  .math.display { margin: 1em 0; }
  table { border-collapse: collapse; margin: 1em 0; }
  th, td { border: 1px solid #ddd; padding: 0.5em 1em; text-align: left; }
  th { background: #f4f4f4; }
  blockquote {
    border-left: 3px solid #ccc;
    margin: 1em 0;
    padding: 0.5em 1em;
    color: #555;
  }
</style>
</head>
<body>
{{ content }}
</body>
</html>
